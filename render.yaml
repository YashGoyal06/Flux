services:
  # Backend Service
  - type: web
    name: flux-backend
    env: python
    region: oregon
    buildCommand: cd backend && pip install -r requirements.txt && python manage.py migrate
    startCommand: cd backend && daphne -b 0.0.0.0 -p $PORT flux_backend.asgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://your-frontend-url.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-frontend-url.onrender.com
      - key: ALLOWED_HOSTS
        value: flux-backend.onrender.com
    healthCheckPath: /health

  # Frontend Service
  - type: web
    name: flux-frontend
    env: static
    region: oregon
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/build
    envVars:
      - key: REACT_APP_BACKEND_URL
        value: https://flux-backend.onrender.com
